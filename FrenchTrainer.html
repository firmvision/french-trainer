<style>
  :root{

  }
  *{box-sizing:border-box}
  body{margin:0;font-family:'Segoe UI',system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--ink);line-height:1.5}
  header{background:linear-gradient(100deg,var(--bleu),#0a6bd4);color:#fff;padding:18px 22px;display:flex;align-items:center;gap:14px;flex-wrap:wrap}
  header .flag{width:34px;height:24px;border-radius:4px;overflow:hidden;display:flex;box-shadow:0 1px 4px rgba(0,0,0,.25)}
  header .flag i{flex:1}
  header .flag .b{background:#0055A4}header .flag .w{background:#fff}header .flag .r{background:#EF4135}
  header h1{font-size:1.15rem;margin:0;font-weight:700}
  header .sub{font-size:.8rem;opacity:.9}
  header .stats{margin-left:auto;display:flex;gap:18px;font-size:.85rem;text-align:center}
  header .stats b{display:block;font-size:1.15rem}
  .wrap{max-width:880px;margin:0 auto;padding:22px 16px 80px}
  .grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:14px}
  .card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:18px;box-shadow:var(--shadow)}
  .tile{cursor:pointer;transition:transform .12s,box-shadow .12s;position:relative;overflow:hidden}
  .tile:hover{transform:translateY(-3px);box-shadow:0 12px 30px rgba(20,40,80,.14)}
  .tile h3{margin:.2rem 0 .3rem;font-size:1.05rem}
  .tile p{margin:0;color:var(--muted);font-size:.85rem}
  .tile .ico{font-size:1.7rem}
  .tile .tag{position:absolute;top:12px;right:12px;font-size:.68rem;background:#eef3fb;color:var(--bleu);padding:3px 8px;border-radius:20px;font-weight:600}
  .tile.focus{border-color:var(--rouge)}
  .tile.focus .tag{background:#fdeaea;color:var(--rouge)}
  h2.section{font-size:1rem;color:var(--muted);text-transform:uppercase;letter-spacing:.04em;margin:26px 4px 10px;font-weight:700}
  .btn{background:var(--bleu);color:#fff;border:none;padding:11px 18px;border-radius:12px;font-size:.95rem;font-weight:600;cursor:pointer;transition:filter .12s}
  .btn:hover{filter:brightness(1.08)}
  .btn.ghost{background:#eef3fb;color:var(--bleu)}
  .btn.red{background:var(--rouge)}
  .btn.sm{padding:8px 13px;font-size:.85rem}
  .btn:disabled{opacity:.5;cursor:not-allowed}
  .row{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
  .progress{height:9px;background:#eef1f6;border-radius:20px;overflow:hidden;margin:6px 0 2px}
  .progress i{display:block;height:100%;background:linear-gradient(90deg,var(--bleu),var(--rouge));transition:width .3s}
  .q-prompt{font-size:1.25rem;margin:6px 0 16px;font-weight:600}
  .q-prompt .blank{color:var(--rouge);font-weight:800}
  .opt{display:block;width:100%;text-align:left;background:#fff;border:2px solid var(--line);border-radius:12px;padding:13px 15px;margin:8px 0;font-size:1rem;cursor:pointer;transition:.12s}
  .opt:hover{border-color:var(--bleu);background:#f7faff}
  .opt.correct{border-color:var(--good);background:#eafaf0}
  .opt.wrong{border-color:var(--bad);background:#fdecec}
  .opt:disabled{cursor:default}
  input.txt{width:100%;padding:13px 15px;border:2px solid var(--line);border-radius:12px;font-size:1.05rem;font-family:inherit}
  input.txt:focus{outline:none;border-color:var(--bleu)}
  .feedback{margin-top:14px;padding:13px 15px;border-radius:12px;font-size:.95rem;display:none}
  .feedback.show{display:block}
  .feedback.ok{background:#eafaf0;border:1px solid #bfe8cd}
  .feedback.no{background:#fdecec;border:1px solid #f3c9c9}
  .feedback.tip{background:#fff6e8;border:1px solid #f3deb6}
  .feedback b{color:var(--bleu)}
  .muted{color:var(--muted)}
  .center{text-align:center}
  .big{font-size:2.4rem;font-weight:800;margin:6px 0}
  .pill{display:inline-block;background:#eef3fb;color:var(--bleu);padding:4px 12px;border-radius:20px;font-size:.85rem;font-weight:600;margin:3px}
  .speak-btn{background:var(--rouge);color:#fff;border:none;border-radius:50%;width:64px;height:64px;font-size:1.6rem;cursor:pointer;box-shadow:var(--shadow)}
  .speak-btn:active{transform:scale(.95)}
  .back{background:none;border:none;color:var(--bleu);font-weight:600;cursor:pointer;font-size:.9rem;padding:0;margin-bottom:8px}
  .hidden{display:none}
  .deck-list{display:flex;gap:8px;flex-wrap:wrap;margin:10px 0}
  .deck-list button{border:2px solid var(--line);background:#fff;border-radius:20px;padding:7px 14px;cursor:pointer;font-size:.85rem;font-weight:600}
  .deck-list button.active{border-color:var(--bleu);background:#eef3fb;color:var(--bleu)}
  table.recap{width:100%;border-collapse:collapse;margin-top:10px}
  table.recap td{padding:7px 4px;border-bottom:1px solid var(--line);font-size:.9rem;vertical-align:top}
  table.recap td:first-child{width:26px}
  footer{text-align:center;color:var(--muted);font-size:.78rem;padding:24px}
  .lesson{font-size:.98rem;line-height:1.65}
  .lesson h4{margin:16px 0 4px;color:var(--bleu);font-size:1rem}
  .lesson table{width:100%;border-collapse:collapse;margin:8px 0}
  .lesson td,.lesson th{border:1px solid var(--line);padding:6px 9px;text-align:left;font-size:.9rem}
  .lesson th{background:#eef3fb}
  .lesson .ex{background:#f7faff;border-left:3px solid var(--bleu);padding:6px 10px;margin:6px 0;border-radius:4px}
  .lesson .ex em{color:var(--muted);font-style:normal}
  @media(max-width:520px){header .stats{width:100%;margin-left:0;justify-content:space-around}.q-prompt{font-size:1.1rem}}
</style>
</head>

    <h4>Past participles by group</h4>
    <table><tr><th>Group</th><th>Ending</th><th>Example</th></tr>
    <tr><td>-er</td><td>-é</td><td>manger → mang<b>é</b></td></tr>
    <tr><td>-ir</td><td>-i</td><td>finir → fin<b>i</b></td></tr>
    <tr><td>-re</td><td>-u</td><td>vendre → vend<b>u</b></td></tr></table>
    <p>Common irregulars: faire→<b>fait</b>, prendre→<b>pris</b>, voir→<b>vu</b>, avoir→<b>eu</b>, être→<b>été</b>.</p>
    <div class="ex">Hier, j'<b>ai mangé</b> au restaurant. — Tu <b>as fait</b> la cuisine. <em>(Yesterday I ate out. You did the cooking.)</em></div>
    <h4>avoir vs être</h4>
    <p>Most verbs use <b>avoir</b>. But a small set of movement/change verbs use <b>être</b> — and with être, the participle <b>agrees</b> with the subject (add -e for feminine, -s for plural):</p>
    <p>The être verbs: aller, venir, arriver, partir, entrer, sortir, monter, descendre, naître, mourir, rester, tomber, devenir, and all reflexive verbs.</p>
    <div class="ex">Elle <b>est allé<u>e</u></b> au marché. — Ils <b>sont venu<u>s</u></b>. — Elles <b>sont resté<u>es</u></b>. <em>(agreement: -e fem., -s plural, -es fem. plural)</em></div>`},

  {title:"L'imparfait", level:"A2", ico:"⭐", sub:"Past habits, descriptions, and 'was/were doing'.", practice:"verbs", focus:true, body:`
    <p>Used for <b>ongoing or repeated</b> past actions, descriptions, and background ("I used to...", "it was raining", "when I was a child").</p>
    <h4>Formation — one rule for almost every verb</h4>
    <p>Take the <b>nous</b> form of the present (nous parl<b>ons</b>), drop -ons, add: <b>-ais, -ais, -ait, -ions, -iez, -aient</b>.</p>
    <table><tr><th>Pronoun</th><th>parler → parl-</th></tr>
    <tr><td>je</td><td>parl<b>ais</b></td></tr><tr><td>tu</td><td>parl<b>ais</b></td></tr><tr><td>il</td><td>parl<b>ait</b></td></tr>
    <tr><td>nous</td><td>parl<b>ions</b></td></tr><tr><td>vous</td><td>parl<b>iez</b></td></tr><tr><td>ils</td><td>parl<b>aient</b></td></tr></table>
    <p>Only irregular stem: <b>être</b> → j'<b>étais</b>, tu étais, il était, nous étions...</p>
    <div class="ex">Quand j'<b>étais</b> petit, je <b>jouais</b> au foot. — Il <b>faisait</b> beau. <em>(When I was little, I used to play football. The weather was nice.)</em></div>`},

  {title:"Passé composé vs imparfait", level:"B1", ico:"⚖️", sub:"The choice that trips everyone up.", practice:"verbs", focus:true, body:`
    <p>This is the most important past-tense decision in French. Same timeframe, different jobs:</p>
    <table><tr><th>Passé composé</th><th>Imparfait</th></tr>
    <tr><td>A single, completed action</td><td>Background, description, weather, feelings</td></tr>
    <tr><td>Something that happened once</td><td>A habit ("used to / would")</td></tr>
    <tr><td>Moves the story forward</td><td>Sets the scene</td></tr></table>
    <div class="ex">Il <b>pleuvait</b> (background) quand je <b>suis sorti</b> (action). <em>(It was raining when I went out.)</em></div>
    <div class="ex">Avant, je <b>fumais</b> (habit). Un jour, j'<b>ai arrêté</b> (single action). <em>(I used to smoke. One day, I quit.)</em></div>
    <p><b>Trick:</b> if you can say "was/were ___-ing" or "used to", choose imparfait. If it's a done deal at a point in time, passé composé.</p>`},

  {title:"Le futur proche", level:"A2", ico:"🔜", sub:"The easy way to talk about the future.", practice:"verbs", focus:false, body:`
    <p>The simplest future: <b>aller (present) + infinitive</b> — just like English "going to".</p>
    <table><tr><td>je vais</td><td rowspan="3" style="vertical-align:middle">+ infinitive<br>(manger, partir, étudier...)</td></tr>
    <tr><td>tu vas / il va</td></tr><tr><td>nous allons / vous allez / ils vont</td></tr></table>
    <div class="ex">Je <b>vais étudier</b> ce soir. — Nous <b>allons immigrer</b> au Canada. <em>(I'm going to study tonight. We're going to immigrate to Canada.)</em></div>`},

  {title:"Le conditionnel & les phrases avec « si »", level:"B1", ico:"💭", sub:"Politeness and hypotheticals.", practice:"verbs", focus:false, body:`
    <p>The conditional = "would". Formula: <b>infinitive + imparfait endings</b> (-ais, -ais, -ait, -ions, -iez, -aient).</p>
    <div class="ex">Je <b>voudrais</b> un café. <em>(polite: I would like a coffee.)</em> — Je <b>voyagerais</b> partout. <em>(I would travel everywhere.)</em></div>
    <h4>"Si" (if) sentences — match the tenses</h4>
    <table><tr><th>If-clause</th><th>Result clause</th></tr>
    <tr><td>si + présent</td><td>futur / futur proche</td></tr>
    <tr><td>si + imparfait</td><td>conditionnel</td></tr></table>
    <div class="ex">Si j'<b>ai</b> le temps, je <b>vais étudier</b>. — Si j'<b>avais</b> le temps, je <b>voyagerais</b>.</div>`},

  {title:"Articles, genre & négation", level:"A1", ico:"🔤", sub:"Gender, 'the/a', and saying no.", practice:null, focus:false, body:`
    <p>Every noun is masculine or feminine — learn the article <b>with</b> the word.</p>
    <table><tr><th></th><th>Masculine</th><th>Feminine</th><th>Plural</th></tr>
    <tr><td>the</td><td>le (l')</td><td>la (l')</td><td>les</td></tr>
    <tr><td>a / some</td><td>un</td><td>une</td><td>des</td></tr></table>
    <div class="ex"><b>le</b> chat, <b>la</b> maison, <b>l'</b>emploi, <b>les</b> amis, <b>un</b> diplôme, <b>une</b> entreprise.</div>
    <h4>Negation: ne ... pas</h4>
    <p>Wrap the verb: <b>ne</b> + verb + <b>pas</b>. Other pairs: ne...jamais (never), ne...rien (nothing), ne...plus (no longer).</p>
    <div class="ex">Je <b>ne</b> parle <b>pas</b> espagnol. — Je <b>n'</b>ai <b>jamais</b> visité Québec.</div>`},

  {title:"Connecteurs pour bien écrire", level:"B1", ico:"🔗", sub:"Linking words that lift your writing to B2.", practice:"translate", focus:true, body:`
    <p>The TEF writing and speaking sections reward <b>connected, argued</b> ideas. Use these to structure answers:</p>
    <table><tr><th>To...</th><th>Use</th></tr>
    <tr><td>give a reason</td><td>parce que, car, à cause de</td></tr>
    <tr><td>show a result</td><td>donc, alors, c'est pourquoi</td></tr>

    <div class="ex">D'abord, le français donne des points. <b>De plus</b>, il existe des tirages spéciaux. <b>C'est pourquoi</b> j'apprends la langue.</div>`},

/* ============ STATE / STORAGE ============ */
const USERS_KEY="frenchTrainer_users";
const CUR_KEY="frenchTrainer_current";
function userKey(name){ return "frenchTrainer_user_"+name; }
function getUsers(){ try{ return JSON.parse(localStorage.getItem(USERS_KEY))||[]; }catch(e){ return []; } }
function setUsers(u){ try{ localStorage.setItem(USERS_KEY, JSON.stringify(u)); }catch(e){} }
function currentUser(){ try{ return localStorage.getItem(CUR_KEY)||null; }catch(e){ return null; } }
function defaultState(){ return {xp:0, streak:0, lastDay:null, level:"A1", vocab:{}, modeAcc:{}, history:[], _seen:{}}; }
function load(){
  const u=currentUser();
  if(u){ try{ const r=localStorage.getItem(userKey(u)); if(r) return JSON.parse(r); }catch(e){} }
  return defaultState();
}
function save(){ const u=currentUser(); if(u){ try{ localStorage.setItem(userKey(u), JSON.stringify(S)); }catch(e){} } renderHeader(); }
let S = load();
function today(){ return new Date().toISOString().slice(0,10); }
function bumpStreak(){
  const t = today();
  if(S.lastDay === t) return;
  const y = new Date(Date.now()-86400000).toISOString().slice(0,10);
  S.streak = (S.lastDay === y) ? S.streak+1 : 1;
  S.lastDay = t;
}
function addXp(n){ S.xp += n; bumpStreak(); save(); }
function recordAcc(mode, correct, total){
  S.modeAcc[mode] = S.modeAcc[mode] || {c:0,t:0};
  S.modeAcc[mode].c += correct; S.modeAcc[mode].t += total;
  save();
}

/* ============ HELPERS ============ */
const $ = sel => document.querySelector(sel);
function el(html){ const d=document.createElement('div'); d.innerHTML=html.trim(); return d.firstChild; }
function norm(s){ return (s||"").toLowerCase().trim().replace(/[.,!?;:]/g,"").replace(/['']/g,"'").replace(/\s+/g," "); }
function stripAcc(s){ return s.normalize("NFD").replace(/[̀-ͯ]/g,""); }
function loose(s){ return stripAcc(norm(s)).replace(/['\- ]/g,""); }
function checkText(input, accept){
  const ni = norm(input);
  for(const a of accept){ if(ni === norm(a)) return {ok:true}; }
  const li = loose(input);
  for(const a of accept){ if(li === loose(a)) return {ok:true, accentTip:true}; }
  return {ok:false};
}
function shuffle(a){ a=a.slice(); for(let i=a.length-1;i>0;i--){const j=Math.random()*(i+1)|0;[a[i],a[j]]=[a[j],a[i]];} return a; }

function renderHeader(){
  $("#stStreak").textContent = S.streak;
  $("#stXp").textContent = S.xp;
  $("#stLevel").textContent = S.level;
  const w=document.getElementById('whoami'); if(w) w.textContent='Road to CLB 7 · '+(currentUser()||'guest');
}

/* ============ QUIZ ENGINE ============ */
function quizScreen(title, total){
  const v=$("#view"); v.innerHTML="";
  v.appendChild(el(`<button class="back" id="bk">← Back to menu</button>`));
  $("#bk").onclick = home;
  v.appendChild(el(`<div class="card">
    <div class="row" style="justify-content:space-between"><b>${title}</b><span class="muted" id="qcount"></span></div>
    <div class="progress"><i id="qbar" style="width:0%"></i></div>
    <div id="qbody" style="margin-top:14px"></div>
  </div>`));
}
function setBar(i,total){ $("#qbar").style.width = (100*i/total)+"%"; $("#qcount").textContent = `${i}/${total}`; }

/* generic MCQ runner */
function runMCQ(title, items, mode, opts={}){
  items = opts.noShuffle? items : shuffle(items);
  let i=0, correct=0;
  quizScreen(title, items.length);
  function step(){
    setBar(i, items.length);
    if(i>=items.length){ return finish(); }
    const it = items[i];
    const body=$("#qbody"); body.innerHTML="";
    if(opts.pre) body.appendChild(el(opts.pre(it)));
    body.appendChild(el(`<div class="q-prompt">${it.q||opts.q(it)}</div>`));
    const optArr = it.opts;
    optArr.forEach((o,idx)=>{
      const b=el(`<button class="opt">${o}</button>`);
      b.onclick=()=>{
        [...body.querySelectorAll('.opt')].forEach(x=>x.disabled=true);
        const right = idx===it.a;
        if(right){ b.classList.add('correct'); correct++; addXp(5); }
        else{ b.classList.add('wrong'); body.querySelectorAll('.opt')[it.a].classList.add('correct'); }
        const fb=el(`<div class="feedback ${right?'ok':'no'} show">${right?'✅ Correct!':'❌ Not quite.'} ${it.ex?'<br>'+it.ex:''}</div>`);
        body.appendChild(fb);
        body.appendChild(nextBtn());
      };
      body.appendChild(b);
    });
  }
  function nextBtn(){ const b=el(`<button class="btn" style="margin-top:14px">Next →</button>`); b.onclick=()=>{i++;step();}; return b; }
  function finish(){ recordAcc(mode,correct,items.length); resultCard(title,correct,items.length); }
  step();
}

/* generic text-input runner */
function runText(title, items, mode, opts={}){
  items = shuffle(items);
  let i=0, correct=0; const review=[];
  quizScreen(title, items.length);
  function step(){
    setBar(i, items.length);
    if(i>=items.length) return finish();
    const it=items[i];
    const body=$("#qbody"); body.innerHTML="";
    body.appendChild(el(`<div class="q-prompt">${opts.prompt(it)}</div>`));
    if(it.tense) body.appendChild(el(`<span class="pill">${it.tense}</span>`));
    const inp=el(`<input class="txt" placeholder="Type in French..." autocomplete="off" autocapitalize="off" spellcheck="false">`);
    body.appendChild(inp); inp.focus();
    const sub=el(`<button class="btn" style="margin-top:14px">Check</button>`);
    body.appendChild(sub);
    const fbWrap=el(`<div id="fb"></div>`); body.appendChild(fbWrap);
    function submit(){
      const res=checkText(inp.value, it.accept);
      inp.disabled=true; sub.disabled=true;
      let cls,msg;
      if(res.ok && !res.accentTip){ cls='ok'; msg='✅ Correct !'; correct++; addXp(8); review.push({it,ok:true}); }
      else if(res.ok && res.accentTip){ cls='tip'; msg='✅ Right — watch your accents though.'; correct++; addXp(6); review.push({it,ok:true}); }
      else { cls='no'; msg='❌ Not quite.'; review.push({it,ok:false}); }
      fbWrap.appendChild(el(`<div class="feedback ${cls} show">${msg}<br><b>Answer:</b> ${it.accept[0]}${it.ex?'<br>'+it.ex:''}${it.hint?'<br><span class="muted">'+it.hint+'</span>':''}</div>`));
      const nb=el(`<button class="btn" style="margin-top:12px">Next →</button>`); nb.onclick=()=>{i++;step();}; fbWrap.appendChild(nb);
    }
    sub.onclick=submit;
    inp.addEventListener('keydown',e=>{ if(e.key==='Enter'&&!inp.disabled) submit(); });
  }
  function finish(){ recordAcc(mode,correct,items.length); resultCard(title,correct,items.length,review); }
  step();
}

/* ============ MODE: PLACEMENT ============ */
function placement(){
  const items = PLACEMENT.map(p=>({q:`<span class="muted" style="font-size:.8rem">${p.lvl}</span><br>${p.q}`, opts:p.opts, a:p.a, lvl:p.lvl}));
  let i=0, correct=0; const byLvl={A1:[0,0],A2:[0,0],B1:[0,0],B2:[0,0]};
  quizScreen("🎯 Placement Test", items.length);
  function step(){
    setBar(i,items.length);
    if(i>=items.length) return finish();
    const it=items[i], lvl=PLACEMENT[i].lvl;
    const body=$("#qbody"); body.innerHTML="";
    body.appendChild(el(`<div class="q-prompt">${it.q}</div>`));
    it.opts.forEach((o,idx)=>{
      const b=el(`<button class="opt">${o}</button>`);
      b.onclick=()=>{
        [...body.querySelectorAll('.opt')].forEach(x=>x.disabled=true);
        byLvl[lvl][1]++;
        const right=idx===it.a;
        if(right){ b.classList.add('correct'); correct++; byLvl[lvl][0]++; }
        else{ b.classList.add('wrong'); body.querySelectorAll('.opt')[it.a].classList.add('correct'); }
        const nb=el(`<button class="btn" style="margin-top:14px">Next →</button>`); nb.onclick=()=>{i++;step();}; body.appendChild(nb);
      };
      body.appendChild(b);
    });
  }
  function finish(){
    const order=["A1","A2","B1","B2"]; let lvl="A1";
    for(const L of order){ const a=byLvl[L]; if(a[1]>0 && a[0]/a[1]>=0.66) lvl=L; else break; }
    const clbMap={A1:"pre-CLB 4",A2:"CLB 4–5",B1:"CLB 5–6",B2:"CLB 7 ✅"};
    S.level=lvl; recordAcc("placement",correct,items.length); addXp(20); save();
    const v=$("#view"); v.innerHTML="";
    v.appendChild(el(`<div class="card center">
      <div class="muted">Your estimated level</div>
      <div class="big" style="color:var(--bleu)">${lvl}</div>
      <div class="pill">≈ ${clbMap[lvl]}</div>
      <p style="margin-top:14px">Score: <b>${correct}/${items.length}</b></p>
      <p class="muted" style="font-size:.9rem">${lvl==='B2'?'You are at the target — switch to TEF mock practice!':'Target is B2 / CLB 7. Your fastest route: lessons + Verb Lab + Translation, daily.'}</p>
      <div class="row center" style="justify-content:center;margin-top:10px">
        <button class="btn" id="toLearn">Start learning →</button>
        <button class="btn ghost" id="toHome">Menu</button>
      </div>
    </div>`));
    document.getElementById("toLearn").onclick=learn; document.getElementById("toHome").onclick=home;
  }
  step();
}

/* ============ MODE: LISTENING (TTS) ============ */
let voicesReady=false;
function pickVoice(){
  const vs=speechSynthesis.getVoices();
  return vs.find(v=>/fr-FR/i.test(v.lang)) || vs.find(v=>/^fr/i.test(v.lang)) || null;
}
function speak(text){
  if(!('speechSynthesis' in window)){ alert("Your browser doesn't support speech. Try Chrome or Edge."); return; }
  speechSynthesis.cancel();
  const u=new SpeechSynthesisUtterance(text); u.lang="fr-FR"; u.rate=0.9;
  const v=pickVoice(); if(v) u.voice=v;
  speechSynthesis.speak(u);
}
function listen(){
  if('speechSynthesis' in window){ speechSynthesis.getVoices(); }
  const items = shuffle(LISTEN).slice(0,8);
  let i=0, correct=0;
  quizScreen("🎧 Listening", items.length);
  function step(){
    setBar(i,items.length);
    if(i>=items.length) return finish();
    const it=items[i];
    const others = shuffle(LISTEN.filter(x=>x!==it)).slice(0,3).map(x=>x.en);
    const opts = shuffle([it.en, ...others]);
    const aIdx = opts.indexOf(it.en);
    const body=$("#qbody"); body.innerHTML="";
    body.appendChild(el(`<div class="center" style="margin:6px 0 16px"><button class="speak-btn" id="play">🔊</button><div class="muted" style="margin-top:8px">Tap to hear it again</div></div>`));
    body.appendChild(el(`<div class="q-prompt" style="font-size:1.05rem">What does it mean?</div>`));
    document.getElementById("play").onclick=()=>speak(it.fr);
    speak(it.fr);
    opts.forEach((o,idx)=>{
      const b=el(`<button class="opt">${o}</button>`);
      b.onclick=()=>{
        [...body.querySelectorAll('.opt')].forEach(x=>x.disabled=true);
        const right=idx===aIdx;
        if(right){ b.classList.add('correct'); correct++; addXp(6); }
        else{ b.classList.add('wrong'); body.querySelectorAll('.opt')[aIdx].classList.add('correct'); }
        body.appendChild(el(`<div class="feedback ${right?'ok':'no'} show">${right?'✅ Bravo !':'❌'} <br><b>${it.fr}</b></div>`));
        const nb=el(`<button class="btn" style="margin-top:12px">Next →</button>`); nb.onclick=()=>{i++;step();}; body.appendChild(nb);
      };
      body.appendChild(b);
    });
  }
  function finish(){ recordAcc("listen",correct,items.length); resultCard("🎧 Listening",correct,items.length); }
  step();
}

/* ============ MODE: VOCAB (flashcards) ============ */
function vocab(){
  const v=$("#view"); v.innerHTML="";
  v.appendChild(el(`<button class="back" id="bk">← Back to menu</button>`));
  document.getElementById("bk").onclick=home;
  const themes=Object.keys(VOCAB);

  v.appendChild(el(`<div class="card"><b>📇 Vocabulary</b><div class="deck-list" id="decks"></div><div id="flash"></div></div>`));
  function renderDecks(){
    const d=$("#decks"); d.innerHTML="";
    themes.forEach(t=>{ const b=el(`<button class="${t===theme?'active':''}">${t}</button>`); b.onclick=()=>{theme=t;renderDecks();startDeck();}; d.appendChild(b); });
  }
  function startDeck(){
    const cards=shuffle(VOCAB[theme]); let i=0, correct=0; let flipped=false;
    const f=$("#flash");
    function card(){
      if(i>=cards.length){
        recordAcc("vocab",correct,cards.length);
        f.innerHTML=`<div class="center" style="padding:20px 0"><div class="big">🎉</div><p>Deck done — you knew <b>${correct}/${cards.length}</b>.</p><button class="btn" id="again">Again</button></div>`;
        document.getElementById("again").onclick=startDeck; return;
      }
      const c=cards[i]; flipped=false;
      f.innerHTML="";
      f.appendChild(el(`<div class="progress"><i style="width:${100*i/cards.length}%"></i></div>`));
      const cardBox=el(`<div class="card center" style="cursor:pointer;min-height:140px;display:flex;flex-direction:column;justify-content:center"><div style="font-size:1.5rem;font-weight:700;color:var(--bleu)">${c.fr}</div><div class="muted" style="margin-top:6px;font-size:.85rem">tap to reveal</div></div>`);
      f.appendChild(cardBox);

        f.appendChild(row);
        document.getElementById("yes").onclick=()=>{correct++;addXp(3);i++;card();};
        document.getElementById("no").onclick=()=>{i++;card();};
      };
    }
    card();

}

/* ============ RESULT CARD ============ */
function resultCard(title, correct, total, review){
  const v=$("#view"); v.innerHTML="";
  const pct=Math.round(100*correct/total);
  const msg = pct>=80?"Excellent ! 🎉" : pct>=60?"Good progress — keep going!" : "Keep practising — repetition wins.";
  v.appendChild(el(`<div class="card center"><div class="muted">${title}</div><div class="big" style="color:${pct>=60?'var(--good)':'var(--rouge)'}">${correct}/${total}</div><p>${msg}</p><div class="row center" style="justify-content:center"><button class="btn" id="retry">Again</button><button class="btn ghost" id="menu">Menu</button></div></div>`));
  if(review && review.some(r=>!r.ok)){
    const miss=review.filter(r=>!r.ok);
    const t=el(`<div class="card"><b>Review your misses</b><table class="recap"></table></div>`);
    const tb=t.querySelector('table');
    miss.forEach(r=>{ tb.appendChild(el(`<tr><td>❌</td><td>${r.it.en||r.it.q}<br><span style="color:var(--good)">${r.it.accept[0]}</span></td></tr>`)); });
    v.appendChild(t);
  }
  document.getElementById("retry").onclick=()=>{
    if(title.includes('Verb')) verbs();
    else if(title.includes('Translation')) translate();
    else if(title.includes('Listening')) listen();
    else if(title.includes('Dictée')) dictee();
    else if(title.includes('Reading')) reading();
    else home();
  };
  document.getElementById("menu").onclick=home;
}

/* ============ MODE: DICTÉE ============ */
function dictee(){
  const items=shuffle(LISTEN).slice(0,8);
  let i=0,correct=0;const review=[];
  quizScreen("📝 Dictée — type what you hear", items.length);
  function step(){
    setBar(i,items.length);
    if(i>=items.length) return finish();
    const it=items[i];
    const body=$("#qbody");body.innerHTML="";
    body.appendChild(el(`<div class="center" style="margin:6px 0 14px"><button class="speak-btn" id="play">🔊</button><div class="muted" style="margin-top:8px">Tap to replay · write the French sentence</div></div>`));
    document.getElementById("play").onclick=()=>speak(it.fr);
    speak(it.fr);
    const inp=el(`<input class="txt" placeholder="Écrivez ce que vous entendez..." autocomplete="off" autocapitalize="off" spellcheck="false">`);
    body.appendChild(inp);inp.focus();
    const sub=el(`<button class="btn" style="margin-top:14px">Check</button>`);body.appendChild(sub);
    const fb=el(`<div id="fb"></div>`);body.appendChild(fb);
    function submit(){
      const res=checkText(inp.value,[it.fr]);
      inp.disabled=true;sub.disabled=true;
      let cls,msg,ok=!!res.ok;
      if(ok&&!res.accentTip){cls='ok';msg='✅ Parfait !';correct++;addXp(8);}
      else if(ok&&res.accentTip){cls='tip';msg='✅ Right words — watch accents & apostrophes.';correct++;addXp(6);}
      else{cls='no';msg='❌ Not quite.';}
      review.push({it:{en:it.en,accept:[it.fr]},ok});
      fb.appendChild(el(`<div class="feedback ${cls} show">${msg}<br><b>${it.fr}</b><br><span class="muted">${it.en}</span></div>`));
      const nb=el(`<button class="btn" style="margin-top:12px">Next →</button>`);nb.onclick=()=>{i++;step();};fb.appendChild(nb);
    }
    sub.onclick=submit;
    inp.addEventListener('keydown',e=>{if(e.key==='Enter'&&!inp.disabled)submit();});
  }
  function finish(){recordAcc("dictee",correct,items.length);resultCard("📝 Dictée",correct,items.length,review);}
  step();
}

/* ============ MODE: TEF-STYLE MOCK TEST (timed) ============ */
function mock(){
  const pool=[];
  shuffle(PLACEMENT).slice(0,5).forEach(p=>pool.push({type:'mcq',q:`<span class="muted" style="font-size:.78rem">Grammaire</span><br>${p.q}`,opts:p.opts,a:p.a}));
  const passage=READING[Math.floor(Math.random()*READING.length)];
  passage.qs.forEach(q=>pool.push({type:'mcq',pre:`<div class="card" style="background:#f7faff;font-size:.98rem;line-height:1.6">${passage.text}</div>`,q:`<span class="muted" style="font-size:.78rem">Compréhension écrite</span><br>${q.q}`,opts:q.opts,a:q.a}));
  shuffle(LISTEN).slice(0,3).forEach(it=>{
    const others=shuffle(LISTEN.filter(x=>x!==it)).slice(0,3).map(x=>x.en);
    const opts=shuffle([it.en,...others]);
    pool.push({type:'audio',fr:it.fr,q:`<span class="muted" style="font-size:.78rem">Compréhension orale</span><br>Que signifie cette phrase ?`,opts,a:opts.indexOf(it.en)});
  });
  const items=shuffle(pool);
  let i=0,correct=0,timeLeft=12*60;
  quizScreen("🎓 TEF-style Mock Test", items.length);
  const hdr=document.querySelector('#view .card .row');
  const timerEl=el(`<span class="pill" id="mtimer" style="background:#fdeaea;color:var(--rouge)">⏱ 12:00</span>`);
  if(hdr) hdr.appendChild(timerEl);
  function fmt(s){const m=Math.floor(s/60),ss=String(s%60).padStart(2,'0');return m+':'+ss;}
  const tid=setInterval(()=>{
    if(!document.body.contains(timerEl)){clearInterval(tid);return;}
    timeLeft--;
    if(timeLeft<=0){clearInterval(tid);timerEl.textContent='⏱ 0:00';finish(true);return;}
    timerEl.textContent='⏱ '+fmt(timeLeft);
  },1000);
  function step(){
    setBar(i,items.length);
    if(i>=items.length) return finish(false);
    const it=items[i];
    const body=$("#qbody");body.innerHTML="";
    if(it.pre) body.appendChild(el(it.pre));
    if(it.type==='audio'){
      body.appendChild(el(`<div class="center" style="margin:4px 0 12px"><button class="speak-btn" id="play">🔊</button></div>`));
      document.getElementById("play").onclick=()=>speak(it.fr);
      speak(it.fr);
    }
    body.appendChild(el(`<div class="q-prompt">${it.q}</div>`));
    it.opts.forEach((o,idx)=>{
      const b=el(`<button class="opt">${o}</button>`);
      b.onclick=()=>{
        [...body.querySelectorAll('.opt')].forEach(x=>x.disabled=true);
        const right=idx===it.a;
        if(right){b.classList.add('correct');correct++;}
        else{b.classList.add('wrong');body.querySelectorAll('.opt')[it.a].classList.add('correct');}
        const nb=el(`<button class="btn" style="margin-top:14px">Next →</button>`);nb.onclick=()=>{i++;step();};body.appendChild(nb);
      };
      body.appendChild(b);
    });
  }
  function finish(timeUp){
    clearInterval(tid);
    recordAcc("mock",correct,items.length);addXp(15);save();
    const pct=Math.round(100*correct/items.length);
    const v=$("#view");v.innerHTML="";
    v.appendChild(el(`<div class="card center"><div class="muted">${timeUp?'⏱ Temps écoulé ! ':''}Mock test result</div><div class="big" style="color:${pct>=70?'var(--good)':'var(--rouge)'}">${correct}/${items.length}</div><div class="pill">${pct}%</div><p style="margin-top:12px">${pct>=80?'On track for CLB 7 — keep doing timed mocks to lock it in.':pct>=60?'Getting there. Aim for 80%+ before booking the TEF.':'Keep building with lessons + drills, then retry.'}</p><div class="row center" style="justify-content:center"><button class="btn" id="again">Try again</button><button class="btn ghost" id="menu">Menu</button></div></div>`));
    document.getElementById("again").onclick=mock;document.getElementById("menu").onclick=home;
  }
  step();
}

/* ============ DAILY REMINDER ============ */
function scheduleNotify(){
  if(window._notifyTid) clearTimeout(window._notifyTid);
  if(!S.notify || !S.reminderTime) return;
  if(!('Notification' in window) || Notification.permission!=='granted') return;
  const parts=S.reminderTime.split(':'); const h=+parts[0], m=+parts[1];
  const now=new Date(); const next=new Date(); next.setHours(h,m,0,0);
  if(next<=now) next.setTime(next.getTime()+86400000);
  window._notifyTid=setTimeout(()=>{
    try{ new Notification('French Trainer 🇫🇷', {body:"Time for today's French — one lesson + a drill keeps the streak alive!"}); }catch(e){}
    scheduleNotify();
  }, next-now);
}

/* ============ MODE: SPEAKING (speech recognition) ============ */
function speaking(){
  const v=$("#view"); v.innerHTML="";
  v.appendChild(el(`<button class="back" id="bk">← Back to menu</button>`));
  document.getElementById("bk").onclick=home;
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if(!SR){
    v.appendChild(el(`<div class="card"><b>🎙️ Speaking practice</b><p class="muted" style="margin-top:.4rem">Your browser can't do speech recognition here. Use <b>Chrome</b> or <b>Edge</b>, and open the app from a secure <b>https://</b> address (your GitHub Pages link). Microphone features don't work from a local file.</p></div>`));
    return;
  }
  function words(s){ return stripAcc(norm(s)).split(' ').filter(Boolean); }
  function similar(said, target){ const A=words(said), B=words(target); if(!B.length) return 0; let hit=0; const used=[]; B.forEach(w=>{ const idx=A.findIndex((x,j)=>x===w && used.indexOf(j)<0); if(idx>=0){hit++;used.push(idx);} }); return hit/B.length; }
  const items=shuffle(LISTEN).slice(0,6);
  let i=0,correct=0;
  quizScreen("🎙️ Speaking — read it aloud", items.length);
  function step(){
    setBar(i,items.length);
    if(i>=items.length) return finish();
    const it=items[i];
    const body=$("#qbody"); body.innerHTML="";
    body.appendChild(el(`<div class="q-prompt" style="font-size:1.15rem">${it.fr}</div>`));
    body.appendChild(el(`<div class="muted" style="margin:-8px 0 14px">${it.en}</div>`));
    body.appendChild(el(`<div class="center"><button class="btn ghost sm" id="hear">🔊 Hear it</button> &nbsp; <button class="speak-btn" id="mic" style="vertical-align:middle">🎤</button><div class="muted" style="margin-top:8px" id="micmsg">Tap the mic, then read the sentence aloud</div></div>`));
    const fb=el(`<div id="fb"></div>`); body.appendChild(fb);
    document.getElementById("hear").onclick=()=>speak(it.fr);
    const mic=document.getElementById("mic"), micmsg=document.getElementById("micmsg");
    mic.onclick=()=>{
      let rec; try{ rec=new SR(); }catch(e){ micmsg.textContent='Could not start microphone.'; return; }
      rec.lang='fr-FR'; rec.interimResults=false; rec.maxAlternatives=3;
      micmsg.textContent='🎙️ Listening… speak now'; mic.disabled=true;
      rec.onresult=(e)=>{
        let best=''; let ok=false; const tgt=loose(it.fr);
        for(let k=0;k<e.results[0].length;k++){ const t=e.results[0][k].transcript; if(!best) best=t; if(loose(t)===tgt){ ok=true; best=t; break; } }
        const score = ok?100:Math.round(100*similar(best, it.fr));
        if(score>=70){ correct++; addXp(8); }
        fb.innerHTML='';
        fb.appendChild(el(`<div class="feedback ${score>=70?'ok':'no'} show">${score>=70?'✅ Bien dit !':'🔁 Close — try again'}<br>You said: <i>${best||'(nothing heard)'}</i><br><b>Target:</b> ${it.fr}<br><span class="muted">Match: ${score}%</span></div>`));
        const nb=el(`<button class="btn" style="margin-top:12px">Next →</button>`); nb.onclick=()=>{i++;step();}; fb.appendChild(nb);
        const rt=el(`<button class="btn ghost" style="margin-top:12px;margin-left:8px">Retry</button>`); rt.onclick=()=>step(); fb.appendChild(rt);
      };
      rec.onerror=(e)=>{ micmsg.textContent='Mic error: '+e.error+'. Allow microphone access and use an https page.'; mic.disabled=false; };
      rec.onend=()=>{ mic.disabled=false; };
      try{ rec.start(); }catch(err){ micmsg.textContent='Could not start mic — check microphone permission.'; mic.disabled=false; }
    };
  }
  function finish(){ recordAcc("speaking",correct,items.length); resultCard("🎙️ Speaking",correct,items.length); }
  step();
}

function loginUser(name){
  const u=getUsers().find(x=>x.name===name);
  if(u && u.pin){
    const entered=prompt('Enter PIN for '+name+':');
    if(entered!==u.pin){ alert('Incorrect PIN.'); return; }
  }
  localStorage.setItem(CUR_KEY, name);
  S=load(); renderHeader(); home(); scheduleNotify();
}
function logout(){
  try{ localStorage.removeItem(CUR_KEY); }catch(e){}
  if(window._notifyTid) clearTimeout(window._notifyTid);
  authScreen();
}
function migrateOld(){
  if(getUsers().length===0){
    let old=null; try{ old=localStorage.getItem("frenchTrainer_v1"); }catch(e){}
    if(old){ const name="Oluwafemi"; setUsers([{name, pin:null}]); try{ localStorage.setItem(userKey(name), old); localStorage.setItem(CUR_KEY, name); }catch(e){} }
  }
}

/* boot */
if('speechSynthesis' in window){ speechSynthesis.onvoiceschanged=()=>{voicesReady=true;}; }
migrateOld();
if(currentUser()){ S=load(); home(); scheduleNotify(); } else { authScreen(); }
</script>
